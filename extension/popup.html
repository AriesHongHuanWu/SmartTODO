<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartTODO</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #f9fafb;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #111827;
    }
    .hidden {
      display: none !important;
    }
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #374151;
    }
    .input-group input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background-color: #2563eb;
    }
    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }
    #errorMsg {
      color: #ef4444;
      font-size: 14px;
      margin-bottom: 12px;
    }
    #statusMsg {
      color: #10b981;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
    }
    .auth-section, .sync-section {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <h2>SmartTODO Messenger</h2>
  
  <div id="errorMsg" class="hidden"></div>
  
  <div id="authSection" class="auth-section">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button id="loginBtn">Login to Sync</button>
  </div>

  <div id="syncSection" class="sync-section hidden">
    <p style="font-size: 14px; color: #4b5563; margin-top: 0;">Logged in. Open Messenger to sync tasks.</p>
    <button id="syncBtn">Sync Now</button>
    <button id="logoutBtn" style="background-color: #ef4444; margin-top: 8px;">Logout</button>
    <div id="statusMsg"></div>
  </div>

  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
